<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sitraka Ramamonjisoa | Media Buyer Meta & Google Ads – Cassivi Digital MG</title>
<meta name="description" content="Media buyer spécialisé Meta Ads & Google Ads. Je transforme vos campagnes publicitaires en machine à clients rentables. +2 ans d'expérience.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --blue: #1A6BF5;
    --blue-light: #3D87FF;
    --blue-dark: #0D4ED6;
    --blue-glow: rgba(26, 107, 245, 0.25);
    --white: #FFFFFF;
    --off-white: #F0F4FF;
    --text: #0A0F1E;
    --text-muted: #5B6A8A;
    --surface: #F7F9FF;
    --border: #E2E8F8;
    --dark: #090E1D;
    --dark-card: #0E1528;
    --dark-border: rgba(255,255,255,0.07);
    --success: #00D68F;
    --wa: #25D366;
    --wa-dark: #1aaa52;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--white);
    color: var(--text);
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, h4 { font-family: 'Syne', sans-serif; }

  /* ─── STICKY NAV ─── */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 999;
    background: rgba(9, 14, 29, 0.92);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--dark-border);
    padding: 14px 5%;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.15rem;
    color: var(--white);
    letter-spacing: -.5px;
  }
  .nav-logo span { color: var(--blue-light); }

  .nav-cta {
    background: var(--wa);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: .82rem;
    padding: 9px 18px;
    border-radius: 50px;
    text-decoration: none;
    display: flex;
    align-items: center;
    gap: 7px;
    transition: all .2s ease;
    white-space: nowrap;
  }
  .nav-cta:hover { background: var(--wa-dark); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(37,211,102,.35); }

  /* ─── HERO ─── */
  .hero {
    min-height: 100vh;
    background: var(--dark);
    position: relative;
    display: flex;
    align-items: center;
    padding: 120px 5% 80px;
    overflow: hidden;
  }

  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 70% 40%, rgba(26,107,245,.18) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(61,135,255,.1) 0%, transparent 55%);
  }

  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(26,107,245,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(26,107,245,.06) 1px, transparent 1px);
    background-size: 60px 60px;
    mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black, transparent);
  }

  .hero-content { position: relative; z-index: 2; max-width: 800px; }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(26,107,245,.15);
    border: 1px solid rgba(26,107,245,.35);
    color: var(--blue-light);
    font-size: .8rem;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 50px;
    margin-bottom: 28px;
    letter-spacing: .5px;
    text-transform: uppercase;
    animation: fadeUp .6s ease both;
  }

  .hero-badge::before {
    content: '';
    width: 7px; height: 7px;
    background: var(--success);
    border-radius: 50%;
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .6; transform: scale(1.3); }
  }

  .hero h1 {
    font-size: clamp(2.1rem, 5vw, 3.6rem);
    font-weight: 800;
    line-height: 1.12;
    color: var(--white);
    margin-bottom: 24px;
    letter-spacing: -1.5px;
    animation: fadeUp .7s .1s ease both;
  }

  .hero h1 em {
    font-style: normal;
    background: linear-gradient(135deg, var(--blue-light), #6eb6ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero-sub {
    font-size: 1.05rem;
    color: rgba(255,255,255,.65);
    line-height: 1.65;
    max-width: 580px;
    margin-bottom: 36px;
    animation: fadeUp .7s .2s ease both;
  }

  .hero-sub strong { color: rgba(255,255,255,.9); }

  .hero-actions {
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 16px;
    margin-bottom: 40px;
    animation: fadeUp .7s .3s ease both;
  }

  .btn-wa {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--wa);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 1rem;
    padding: 16px 30px;
    border-radius: 50px;
    text-decoration: none;
    transition: all .25s ease;
    box-shadow: 0 8px 32px rgba(37,211,102,.3);
    position: relative;
    overflow: hidden;
  }

  .btn-wa::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,.15), transparent);
    opacity: 0;
    transition: opacity .2s;
  }

  .btn-wa:hover { background: var(--wa-dark); transform: translateY(-2px); box-shadow: 0 12px 40px rgba(37,211,102,.4); }
  .btn-wa:hover::after { opacity: 1; }

  .btn-wa svg { flex-shrink: 0; }

  .hero-urgency {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: .85rem;
    color: rgba(255,255,255,.55);
    font-style: italic;
  }
  .hero-urgency span { color: #FFD166; font-style: normal; font-weight: 600; }

  .hero-stats {
    display: flex;
    flex-wrap: wrap;
    gap: 24px;
    animation: fadeUp .7s .4s ease both;
  }

  .hero-stat {
    text-align: left;
  }
  .hero-stat-num {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
  }
  .hero-stat-num span { color: var(--blue-light); }
  .hero-stat-label {
    font-size: .78rem;
    color: rgba(255,255,255,.45);
    text-transform: uppercase;
    letter-spacing: .6px;
    margin-top: 4px;
  }

  .hero-divider {
    width: 1px;
    height: 48px;
    background: rgba(255,255,255,.12);
    align-self: center;
  }

  /* ─── SECTION BASE ─── */
  section { padding: 90px 5%; }

  .section-label {
    font-size: .75rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 14px;
  }

  .section-title {
    font-size: clamp(1.8rem, 3.5vw, 2.6rem);
    font-weight: 800;
    line-height: 1.18;
    letter-spacing: -1px;
    margin-bottom: 16px;
  }

  .section-sub {
    font-size: 1.05rem;
    color: var(--text-muted);
    line-height: 1.7;
    max-width: 560px;
  }

  .center { text-align: center; }
  .center .section-sub { margin: 0 auto; }

  /* ─── PROBLEM ─── */
  .problem { background: var(--off-white); }

  .problem-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 40px;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
  }

  .problem-cards {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .problem-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 22px 24px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: all .2s ease;
  }
  .problem-card:hover { border-color: var(--blue); box-shadow: 0 4px 24px rgba(26,107,245,.08); transform: translateY(-2px); }

  .problem-icon {
    width: 44px; height: 44px;
    background: linear-gradient(135deg, #FFF0F0, #FFE0E0);
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
  }

  .problem-card h4 {
    font-size: .95rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text);
  }
  .problem-card p {
    font-size: .88rem;
    color: var(--text-muted);
    line-height: 1.55;
  }

  .problem-text { }
  .problem-quote {
    font-size: 1.35rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: var(--text);
    line-height: 1.4;
    margin-bottom: 20px;
    letter-spacing: -.5px;
  }
  .problem-quote em {
    font-style: normal;
    color: var(--blue);
  }

  /* ─── STORY ─── */
  .story { background: var(--dark); color: var(--white); position: relative; overflow: hidden; }

  .story-bg {
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 60% at 90% 50%, rgba(26,107,245,.12) 0%, transparent 60%);
  }

  .story-inner {
    position: relative;
    z-index: 2;
    max-width: 720px;
  }

  .story-timeline {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin-top: 40px;
  }

  .story-step {
    display: flex;
    gap: 24px;
    position: relative;
  }

  .story-step-left {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  .story-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    background: var(--blue);
    border: 2px solid var(--blue-light);
    flex-shrink: 0;
    box-shadow: 0 0 12px var(--blue-glow);
    margin-top: 4px;
  }

  .story-line {
    width: 2px;
    flex: 1;
    background: linear-gradient(to bottom, var(--blue-dark), rgba(26,107,245,.1));
    min-height: 40px;
    margin: 4px 0;
  }

  .story-step:last-child .story-line { display: none; }

  .story-step-content {
    padding-bottom: 32px;
  }

  .story-step-tag {
    font-size: .7rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--blue-light);
    margin-bottom: 6px;
  }

  .story-step-content h4 {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 6px;
  }

  .story-step-content p {
    font-size: .93rem;
    color: rgba(255,255,255,.55);
    line-height: 1.65;
  }

  /* ─── SOLUTION ─── */
  .solution { background: var(--white); }

  .solution-inner {
    max-width: 1100px;
    margin: 0 auto;
  }

  .solution-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 48px;
  }

  .solution-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    transition: all .25s ease;
  }

  .solution-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--blue), var(--blue-light));
    border-radius: 3px 3px 0 0;
    opacity: 0;
    transition: opacity .2s;
  }

  .solution-card:hover { transform: translateY(-4px); box-shadow: 0 16px 48px rgba(26,107,245,.1); border-color: transparent; }
  .solution-card:hover::before { opacity: 1; }

  .solution-num {
    font-family: 'Syne', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: var(--border);
    line-height: 1;
    margin-bottom: 16px;
  }

  .solution-card h4 {
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 10px;
    color: var(--text);
  }

  .solution-card p {
    font-size: .9rem;
    color: var(--text-muted);
    line-height: 1.65;
  }

  /* ─── CASE STUDIES ─── */
  .cases { background: var(--dark); color: var(--white); }

  .cases-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 48px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .case-card {
    background: var(--dark-card);
    border: 1px solid var(--dark-border);
    border-radius: 20px;
    padding: 32px 28px;
    position: relative;
    overflow: hidden;
    transition: all .25s ease;
  }

  .case-card::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 120px;
    background: linear-gradient(to top, rgba(26,107,245,.07), transparent);
  }

  .case-card:hover { border-color: rgba(26,107,245,.3); box-shadow: 0 16px 48px rgba(26,107,245,.12); transform: translateY(-4px); }

  .case-tag {
    display: inline-block;
    font-size: .72rem;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    background: rgba(26,107,245,.2);
    color: var(--blue-light);
    padding: 5px 12px;
    border-radius: 50px;
    margin-bottom: 20px;
    border: 1px solid rgba(26,107,245,.25);
  }

  .case-card h4 {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
    margin-bottom: 20px;
  }

  .case-metrics {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .case-metric {
    background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.08);
    border-radius: 12px;
    padding: 12px 16px;
    flex: 1;
    min-width: 90px;
  }

  .case-metric-num {
    font-family: 'Syne', sans-serif;
    font-size: 1.5rem;
    font-weight: 800;
    color: var(--white);
    line-height: 1;
  }

  .case-metric-num.green { color: var(--success); }
  .case-metric-num.blue { color: var(--blue-light); }

  .case-metric-label {
    font-size: .72rem;
    color: rgba(255,255,255,.4);
    text-transform: uppercase;
    letter-spacing: .8px;
    margin-top: 4px;
  }

  .case-desc {
    font-size: .88rem;
    color: rgba(255,255,255,.5);
    line-height: 1.6;
    position: relative;
    z-index: 2;
  }

  /* ─── TESTIMONIALS ─── */
  .testimonials { background: var(--off-white); }

  .testi-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 48px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .testi-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px 28px;
    transition: all .2s ease;
  }
  .testi-card:hover { box-shadow: 0 8px 32px rgba(26,107,245,.08); transform: translateY(-3px); border-color: var(--blue-light); }

  .testi-stars {
    color: #FFB800;
    font-size: 1.1rem;
    letter-spacing: 2px;
    margin-bottom: 14px;
  }

  .testi-text {
    font-size: .95rem;
    color: var(--text);
    line-height: 1.7;
    font-style: italic;
    margin-bottom: 20px;
  }

  .testi-author {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .testi-avatar {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blue), var(--blue-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    color: var(--white);
    font-size: 1rem;
    flex-shrink: 0;
  }

  .testi-name {
    font-size: .93rem;
    font-weight: 700;
    color: var(--text);
  }
  .testi-role {
    font-size: .8rem;
    color: var(--text-muted);
  }

  /* ─── PROCESS ─── */
  .process { background: var(--white); }

  .process-steps {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 0;
    margin-top: 60px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
  }

  .process-steps::before {
    content: '';
    position: absolute;
    top: 28px;
    left: 10%;
    right: 10%;
    height: 2px;
    background: linear-gradient(90deg, var(--blue-dark), var(--blue-light), var(--blue-dark));
    z-index: 0;
  }

  .process-step {
    text-align: center;
    position: relative;
    z-index: 1;
    padding: 0 12px;
  }

  .process-num {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--blue);
    color: var(--white);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
    box-shadow: 0 4px 20px rgba(26,107,245,.35);
    border: 3px solid var(--white);
  }

  .process-step h4 {
    font-size: .95rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }

  .process-step p {
    font-size: .82rem;
    color: var(--text-muted);
    line-height: 1.5;
  }

  /* ─── OBJECTIONS ─── */
  .objections { background: var(--surface); }

  .obj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 24px;
    margin-top: 48px;
    max-width: 1100px;
    margin-left: auto;
    margin-right: auto;
  }

  .obj-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 30px 26px;
    transition: all .2s ease;
  }
  .obj-card:hover { border-color: var(--blue); box-shadow: 0 8px 28px rgba(26,107,245,.08); }

  .obj-q {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 12px;
    font-family: 'Syne', sans-serif;
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }

  .obj-q::before {
    content: '?';
    width: 26px; height: 26px;
    border-radius: 50%;
    background: rgba(26,107,245,.12);
    color: var(--blue);
    font-size: .85rem;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }

  .obj-a {
    font-size: .9rem;
    color: var(--text-muted);
    line-height: 1.7;
    padding-left: 36px;
  }

  /* ─── CTA BANNER ─── */
  .cta-banner {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 50%, var(--blue-light) 100%);
    padding: 70px 5%;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .cta-banner::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(circle at 20% 50%, rgba(255,255,255,.08) 0%, transparent 50%),
      radial-gradient(circle at 80% 50%, rgba(0,0,0,.15) 0%, transparent 50%);
  }

  .cta-banner-inner { position: relative; z-index: 2; }

  .cta-banner h2 {
    font-size: clamp(1.7rem, 3.5vw, 2.5rem);
    font-weight: 800;
    color: var(--white);
    margin-bottom: 14px;
    letter-spacing: -1px;
  }

  .cta-banner p {
    font-size: 1.05rem;
    color: rgba(255,255,255,.8);
    margin-bottom: 32px;
  }

  .btn-wa-large {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.1rem;
    padding: 18px 36px;
    border-radius: 50px;
    text-decoration: none;
    transition: all .25s ease;
    box-shadow: 0 8px 32px rgba(0,0,0,.2);
  }
  .btn-wa-large:hover { transform: translateY(-3px); box-shadow: 0 16px 48px rgba(0,0,0,.3); }

  /* ─── ABOUT ─── */
  .about { background: var(--white); }

  .about-inner {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 60px;
    align-items: center;
    max-width: 900px;
    margin: 0 auto;
  }

  .about-photo {
    width: 180px; height: 180px;
    border-radius: 24px;
    background: linear-gradient(135deg, var(--blue-dark), var(--blue-light));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 3.5rem;
    font-weight: 800;
    color: var(--white);
    flex-shrink: 0;
    position: relative;
    box-shadow: 0 16px 48px rgba(26,107,245,.25);
  }

  .about-photo::after {
    content: '';
